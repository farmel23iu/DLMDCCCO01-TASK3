apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: customer-auth
  namespace: martianbank-app
  labels:
    app.kubernetes.io/part-of: martianbank
    environment: dlmdccco01-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: customer-auth
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
