# Copy this file to k8s/app/secrets.local.yaml, replace all CHANGE_ME
# values, and apply the local file. Do not commit real secrets.
apiVersion: v1
kind: Secret
metadata:
  name: martianbank-app-secrets
  namespace: martianbank-app
  labels:
    app.kubernetes.io/name: martianbank-app
    app.kubernetes.io/part-of: martianbank
    environment: dlmdccco01-dev
type: Opaque
stringData:
  DB_URL: "mongodb://root:CHANGE_ME_MONGODB_PASSWORD@mongodb.martianbank-data.svc.cluster.local:27017"
  JWT_SECRET: "CHANGE_ME_LONG_RANDOM_JWT_SECRET"
  DATABASE_HOST: "root:CHANGE_ME_MONGODB_PASSWORD@mongodb.martianbank-data.svc.cluster.local"
