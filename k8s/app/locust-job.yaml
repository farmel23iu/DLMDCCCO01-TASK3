apiVersion: batch/v1
kind: Job
metadata:
  name: martianbank-locust
  namespace: martianbank-app
  labels:
    app: locust
    app.kubernetes.io/part-of: martianbank
    environment: dlmdccco01-dev
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: locust
        app.kubernetes.io/part-of: martianbank
        environment: dlmdccco01-dev
    spec:
      restartPolicy: Never
      serviceAccountName: martianbank-app
      containers:
        - name: locust
          image: ghcr.io/cisco-open/martian-bank-demo-locust:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - bash locust.sh
          env:
            - name: VITE_USERS_URL
              value: http://customer-auth:8000/api/users
            - name: VITE_ATM_URL
              value: http://atm-locator:8001/api/atm
            - name: VITE_ACCOUNTS_URL
              value: http://dashboard:5000/account
            - name: VITE_TRANSFER_URL
              value: http://dashboard:5000/transaction
            - name: VITE_LOAN_URL
              value: http://dashboard:5000/loan
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
