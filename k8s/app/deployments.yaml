apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: martianbank-app
  labels:
    app: ui
    app.kubernetes.io/part-of: martianbank
    environment: dlmdccco01-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
        app.kubernetes.io/part-of: martianbank
        environment: dlmdccco01-dev
    spec:
      serviceAccountName: martianbank-app
      containers:
        - name: ui
          image: ghcr.io/cisco-open/martian-bank-demo-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: martianbank-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
