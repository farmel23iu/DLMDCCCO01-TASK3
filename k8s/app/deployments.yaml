apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-auth
  namespace: martianbank-app
  labels:
    app: customer-auth
    app.kubernetes.io/part-of: martianbank
    environment: dlmdccco01-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-auth
  template:
    metadata:
      labels:
        app: customer-auth
        app.kubernetes.io/part-of: martianbank
        environment: dlmdccco01-dev
    spec:
      serviceAccountName: martianbank-app
      containers:
        - name: customer-auth
          image: ghcr.io/cisco-open/martian-bank-demo-customer-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: martianbank-config
            - secretRef:
                name: martianbank-app-secrets
          env:
            - name: PORT
              value: "8000"
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: martianbank-app-secrets
                  key: DATABASE_HOST
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /docs.json
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs.json
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
