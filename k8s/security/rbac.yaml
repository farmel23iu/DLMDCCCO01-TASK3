    app.kubernetes.io/name: martianbank-deployer
    app.kubernetes.io/part-of: martianbank
    environment: dlmdccco01-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: martianbank-deployer
  namespace: martianbank-app
  labels:
    app.kubernetes.io/part-of: martianbank
    environment: dlmdccco01-dev
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services", "pods", "pods/log", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: martianbank-deployer
  namespace: martianbank-data
  labels:
    app.kubernetes.io/part-of: martianbank
    environment: dlmdccco01-dev
rules:
  - apiGroups: [""]
    resources: ["secrets", "services", "persistentvolumeclaims", "pods", "pods/log", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: martianbank-deployer
  namespace: martianbank-app
  labels:
    app.kubernetes.io/part-of: martianbank
    environment: dlmdccco01-dev
subjects:
  - kind: ServiceAccount
    name: martianbank-deployer
    namespace: martianbank-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: martianbank-deployer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: martianbank-deployer
  namespace: martianbank-data
  labels:
    app.kubernetes.io/part-of: martianbank
    environment: dlmdccco01-dev
subjects:
