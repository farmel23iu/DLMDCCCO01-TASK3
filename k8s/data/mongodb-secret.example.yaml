# Copy this file to k8s/data/mongodb-secret.local.yaml, replace all CHANGE_ME
# values, and apply the local file. Do not commit real secrets.
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secrets
  namespace: martianbank-data
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: martianbank
    environment: dlmdccco01-dev
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: "root"
  MONGO_INITDB_ROOT_PASSWORD: "CHANGE_ME_MONGODB_PASSWORD"
